<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cream's Macro | Anime Squadron</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .icon { width: 14px; height: 14px; vertical-align: -2px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .icon-lg { width: 16px; height: 16px; vertical-align: -3px; }
    .btn-icon .icon { width: 16px; height: 16px; vertical-align: -2px; }
  </style>
</head>
<body>

  <!-- Waiting overlay (shown when Roblox not found) -->
  <div id="waitingOverlay" class="waiting-overlay">
    <div class="waiting-content">
      <div class="waiting-spinner"></div>
      <div class="waiting-title">Waiting for Roblox...</div>
      <div class="waiting-sub">Open Anime Squadron in Roblox to continue</div>
      <button class="btn btn-start" onclick="launchRoblox()" style="margin-top:12px;flex:none;padding:10px 24px">
        <svg class="icon icon-lg" viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
        Launch Game
      </button>
    </div>
  </div>

  <div class="header">
    <span class="title">Cream's Macro</span>
    <span class="subtitle">Anime Squadron</span>
  </div>

  <div class="btn-row">
    <button id="btnStart" class="btn btn-start" onclick="startQueue()">
      <svg class="icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      Start
    </button>
    <button id="btnStop" class="btn btn-stop" disabled onclick="stopMacro()">
      <svg class="icon" viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
      Stop
    </button>
    <button class="btn btn-icon" onclick="rejoinGame()" title="Rejoin game via deep link">
      <svg class="icon" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
    </button>
    <button class="btn btn-icon" onclick="positionRoblox()" title="Reposition Roblox">
      <svg class="icon" viewBox="0 0 24 24"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    </button>
  </div>

  <!-- Task Queue -->
  <fieldset class="group">
    <legend>
      <svg class="icon" viewBox="0 0 24 24" style="vertical-align:-2px;margin-right:4px;width:12px;height:12px"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Task Queue
    </legend>
    <div class="queue-toolbar">
      <button class="btn btn-sm btn-add" onclick="addTask()">
        <svg class="icon" viewBox="0 0 24 24" style="width:11px;height:11px;vertical-align:-1px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add
      </button>
      <button class="btn btn-sm btn-ghost" onclick="clearQueue()">
        <svg class="icon" viewBox="0 0 24 24" style="width:11px;height:11px;vertical-align:-1px"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        Clear
      </button>
      <label class="toggle">
        <input type="checkbox" id="chkStartOver">
        <span class="toggle-track"></span>
        <svg class="icon" viewBox="0 0 24 24" style="width:11px;height:11px;vertical-align:-1px;margin-right:-4px"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        Loop
      </label>
    </div>
    <div class="loadout-bar">
      <select id="selLoadout" onchange="onLoadoutSelect()">
        <option value="">-- Loadouts --</option>
      </select>
      <button id="btnDelLoadout" class="btn btn-sm btn-danger-sm" onclick="deleteLoadout()" title="Delete selected loadout" style="display:none">
        <svg class="icon" viewBox="0 0 24 24" style="width:11px;height:11px;vertical-align:-1px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="loadoutNameRow" class="loadout-name-row" style="display:none">
      <input type="text" id="txtLoadoutName" placeholder="Loadout name..." maxlength="30">
      <button class="btn btn-sm btn-accent" onclick="confirmSaveLoadout()">
        <svg class="icon" viewBox="0 0 24 24" style="width:11px;height:11px;vertical-align:-1px"><polyline points="20 6 9 17 4 12"/></svg>
      </button>
      <button class="btn btn-sm btn-ghost" onclick="cancelSaveLoadout()">
        <svg class="icon" viewBox="0 0 24 24" style="width:11px;height:11px;vertical-align:-1px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div id="taskList"></div>
  </fieldset>

  <!-- Challenge Rewards -->
  <fieldset class="group">
    <legend>
      <svg class="icon" viewBox="0 0 24 24" style="vertical-align:-2px;margin-right:4px;width:12px;height:12px"><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></svg>
      Challenge Rewards
    </legend>
    <label class="toggle">
      <input type="checkbox" id="chkChallenges">
      <span class="toggle-track"></span>
      Auto-check every 30 min
    </label>
    <div class="divider"></div>
    <div id="rewardList"><span class="muted">Loading...</span></div>
  </fieldset>

  <!-- Discord Webhook -->
  <fieldset class="group">
    <legend>
      <svg class="icon" viewBox="0 0 24 24" style="vertical-align:-2px;margin-right:4px;width:12px;height:12px"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Webhook
    </legend>
    <div class="webhook-row">
      <span id="webhookDot" class="wh-dot dot-none"></span>
      <span id="webhookLabel" class="wh-label">Not set</span>
      <button class="btn btn-sm btn-accent" onclick="pasteWebhook()">
        <svg class="icon" viewBox="0 0 24 24" style="width:11px;height:11px;vertical-align:-1px"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
        Paste
      </button>
      <button class="btn btn-sm btn-danger-sm" onclick="clearWebhook()">
        <svg class="icon" viewBox="0 0 24 24" style="width:11px;height:11px;vertical-align:-1px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="webhook-toggles">
      <label class="toggle">
        <input type="checkbox" id="chkWebhook" checked>
        <span class="toggle-track"></span>
        Enable
      </label>
      <label class="toggle">
        <input type="checkbox" id="chkSilent">
        <span class="toggle-track"></span>
        Silent
      </label>
    </div>
    <div class="screenshot-row">
      <span class="label-sm">
        <svg class="icon" viewBox="0 0 24 24" style="width:11px;height:11px;vertical-align:-1px;margin-right:2px"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        Screenshot:
      </span>
      <select id="selScreenshot">
        <option value="roblox" selected>Roblox</option>
        <option value="fullscreen">Full Screen</option>
        <option value="none">None</option>
      </select>
    </div>
  </fieldset>

  <!-- Status -->
  <fieldset class="group group-status">
    <legend>
      <svg class="icon" viewBox="0 0 24 24" style="vertical-align:-2px;margin-right:4px;width:12px;height:12px"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Status
    </legend>
    <div id="txtState" class="state-text">IDLE</div>
    <div id="txtStats" class="stats-text">V: 0  |  D: 0  |  Runs: 0</div>
  </fieldset>

  <!-- Update Banner -->
  <div id="updateBanner" class="update-banner hidden">
    <span id="updateText">
      <svg class="icon" viewBox="0 0 24 24" style="width:12px;height:12px;vertical-align:-2px;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      A new version is available!
    </span>
    <button id="btnUpdate" class="btn btn-sm btn-accent" onclick="doUpdate()">Update</button>
  </div>

  <div class="footer">
    <span id="versionLabel" class="version-label">v...</span>
  </div>

  <input type="hidden" id="txtWebhook">
  <script src="app.js"></script>
</body>
</html>
