name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Nuitka build
        uses: actions/cache@v4
        with:
          path: |
            dist-nuitka/main.build
            dist-nuitka/main.dist
            dist-nuitka/main.onefile-build
          # Keyed on requirements.txt, not main.py/core/*.py — those change on
          # almost every release, which used to mint a brand-new cache entry
          # every single build instead of reusing/updating one. Nuitka does
          # its own incremental recompile within main.build across runs, so
          # restoring the last build's intermediate objects (even though our
          # own source changed) still lets it skip rebuilding the untouched
          # dependency code (numpy, opencv wrapper, pywebview, etc.) — only
          # this key needs to change when the actual dependency set changes.
          key: nuitka-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: nuitka-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install nuitka Pillow

      - name: Generate logo.ico from logo.png
        run: |
          python -c "
          from PIL import Image
          img = Image.open('logo.png').convert('RGBA')
          img.save('logo.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(256,256)])
          print('Generated logo.ico')
          "

      - name: Build exe (Nuitka)
        run: python build_nuitka.py

      - name: Build bootstrapper exe (Nuitka)
        run: python build_bootstrap.py

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Cream's Macro ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: |
            dist-nuitka/Anime Squadron Creams Macro.exe
            dist-nuitka/Anime Squadron Creams Macro Bootstrapper.exe
